name: proyectos

services:
  db:
    image: postgres:15
    container_name: proyectos_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-proyectos}
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./inmuebles_back
      dockerfile: Dockerfile
    container_name: proyectos_backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-proyectos}
      SECRET_KEY: ${SECRET_KEY:-changeme}
      ALGORITHM: ${ALGORITHM:-HS256}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080,http://localhost:5174,http://127.0.0.1:5174}
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/docs', timeout=3).read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - '${APP_PORT:-8001}:8000'
    restart: unless-stopped

  frontend:
    build:
      context: ./inmuebles_front
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${FRONTEND_API_URL:-http://127.0.0.1:8001}
    container_name: proyectos_frontend
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget -qO- http://127.0.0.1/ >/dev/null || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - '${FRONTEND_PORT:-8080}:80'
    restart: unless-stopped

volumes:
  db_data:
